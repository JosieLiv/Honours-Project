<!-- Beginner Lab 5 - Login page -->
<!DOCTYPE html>
<html>
    <head>
        <!-- tab title -->
        <title>Bookstore Portal - Login </title>
        <!-- link to .css file -->
        <link rel="stylesheet" href="/static/lab.css">
    </head>

    <body>
        <!-- images and h1 heading -->
        <img class="bookLeft" src="{{ url_for('static', filename='/book.jpg')}}" alt="banner">
        <h1>Book Nook</h1>
        <img class="bookRight" src="{{ url_for('static', filename='/store.jpg')}}" alt="banner">

        <!-- login form -->
        <div class="formBox">
            <div class="form">
                <h3>Login:</h3>
                <form method="POST">
                    Username:    <input type="username" name="username" placeholder="enter username" autocomplete="off" required><br>
                    Password:    <input type="password" name="password"><br>
                    <button type="submit">Login</button><br>
                </form>
            </div>
        </div>
    
        <!-- Jinja2 displays flash message when credentials are invalid -->
        {% with messages = get_flashed_messages(with_categories=true) %} 
            {% for category, message in messages %}
                <p class="errorMessage">{{ message }}</p>
            {% endfor %}
        {% endwith %}
        
        <!-- page banner -->
        <div class="banner">
            Book Nook is a fictional website created for the purpose of Web Security Training.
        </div>



    </body>

</html>
